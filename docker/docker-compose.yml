services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: enishi:latest
    ports:
      # HOST_PORT is the port published to the host (NAS / VPS / dev machine).
      # The container always listens on 3000 (Next.js standalone, set in Dockerfile).
      - "${HOST_PORT:-3000}:3000"
    # Loads .env at the repo root directly into the container, no shell substitution
    # needed (zod has defaults for RATE_LIMIT_PER_IP_HOURLY and GLOBAL_DAILY_LIMIT).
    env_file:
      - ../.env
    environment:
      # Override REDIS_URL: inside the compose network, the host is `redis`,
      # not `localhost` (which would point to the container itself).
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
