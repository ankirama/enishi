services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: enishi:latest
    ports:
      # HOST_PORT is the port published to the host (NAS / VPS / dev machine).
      # The container always listens on 3000 (Next.js standalone, set in Dockerfile).
      - "${HOST_PORT:-3000}:3000"
    # Explicit env mapping (compatible with Dockhand / portainer-style UIs that
    # set vars via shell or --env-file rather than mounting an .env into the project).
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RATE_LIMIT_PER_IP_HOURLY: ${RATE_LIMIT_PER_IP_HOURLY:-10}
      GLOBAL_DAILY_LIMIT: ${GLOBAL_DAILY_LIMIT:-500}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-true}
      # Hardcoded — inside the compose network the host is `redis`, not `localhost`.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
